<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- White background -->
  <rect width="32" height="32" rx="4" fill="#ffffff"/>
  <!-- Black cat silhouette -->
  <g fill="#1a1a1a">
    <!-- Body -->
    <ellipse cx="16" cy="20" rx="8" ry="6"/>
    <!-- Head -->
    <circle cx="16" cy="12" r="6"/>
    <!-- Left ear -->
    <polygon points="11,8 9,2 14,6"/>
    <!-- Right ear -->
    <polygon points="21,8 23,2 18,6"/>
    <!-- Eyes (white) -->
    <ellipse cx="13" cy="11" rx="1.5" ry="2" fill="#ffffff"/>
    <ellipse cx="19" cy="11" rx="1.5" ry="2" fill="#ffffff"/>
    <!-- Pupils (dark) -->
    <ellipse cx="13.5" cy="11" rx="0.8" ry="1.2" fill="#1a1a1a"/>
    <ellipse cx="18.5" cy="11" rx="0.8" ry="1.2" fill="#1a1a1a"/>
    <!-- Nose -->
    <polygon points="16,13 15,14 17,14" fill="#ff9999"/>
    <!-- Mouth -->
    <path d="M14,15 Q16,17 18,15" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <!-- Whiskers -->
    <line x1="8" y1="13" x2="4" y2="12" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="8" y1="14" x2="4" y2="15" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="24" y1="13" x2="28" y2="12" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="24" y1="14" x2="28" y2="15" stroke="#1a1a1a" stroke-width="0.5"/>
    <!-- Tail -->
    <path d="M24,20 Q28,18 26,14" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
